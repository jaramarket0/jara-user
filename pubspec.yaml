flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/images/background.png
    - assets/images/grilled-turkey.png
    - assets/images/mama-gold-rice.png
    - assets/images/grilled-chicken.png
    - assets/images/live-chicken.png
    - assets/images/live-turkey.png
    - assets/images/kings-oil.png
    - assets/images/jara_market_logo.png
    - assets/images/clock_illustration.png
    - assets/images/shopping_cart_illustration.png
    - assets/images/megaphone_illustration.png
    - assets/images/meal_prep.png
    - assets/images/okro.png
    - assets/images/ewedu.png
    - assets/images/moringa.png
    - assets/images/afang.png
    - assets/images/egusi.png
    - assets/images/white_soup.png
    - assets/images/GPay.png
    - assets/images/Mastercard.png
    - assets/images/Paypal.png
    - assets/images/ApplePay.png
    - assets/images/Visa.png
    - assets/images/Amex.png
    - assets/images/telephone.svg
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Mont-ExtraLightDEMO.otf
          weight: 200
        - asset: assets/fonts/Mont-HeavyDEMO.otf
          weight: 800
    - family: Roboto
      fonts:
        - asset: assets/fonts/RobotoRomanBold.ttf
          weight: 700
        - asset: assets/fonts/RobotoRomanRegular.ttf
          weight: 400
        - asset: assets/fonts/RobotoRomanMedium.ttf
          weight: 500
        - asset: assets/fonts/RobotoRegular.ttf
          weight: 400
        - asset: assets/fonts/RobotoRomanSemiBold.ttf
          weight: 600
        - asset: assets/fonts/RobotoItalicSemiBold.ttf
          weight: 600
    - family: Inter
      fonts:
        - asset: assets/fonts/InterRegular.ttf
          weight: 400
    - family: Montserrat
      fonts:
        - asset: assets/fonts/MontserratMedium.ttf
          weight: 500
    - family: Source Sans Pro
      fonts:
        - asset: assets/fonts/SourceSansProRegular.ttf
          weight: 400
        # - asset: assets/fonts/Mont-ExtraLightDEMO.otf
        #   weight: 200
        # - asset: assets/fonts/Mont-ExtraLightDEMO.otf
        #   weight: 300
        # - asset: assets/fonts/Mont-ExtraLightDEMO.otf
        #   weight: 400
        # - asset: assets/fonts/Mont-ExtraLightDEMO.otf
        #   weight: 500
        # - asset: assets/fonts/Mont-HeavyDEMO.otf
        #   weight: 600
        # - asset: assets/fonts/Mont-RegularDEMO.otf
        #   weight: 400
        # - asset: assets/fonts/Mont-SemiBoldDEMO.otf
        #   weight: 600
        # - asset: assets/fonts/Mont-ThinDEMO.otf
        #         weight: 100

    

launcher_name:
  default: "Jara Market"


flutter_launcher_icons:
  image_path: "assets/images/jaralogo.png"
  android:
    generate: true
    image_path: "assets/images/jaralogo.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"
  linux:
    generate: true
    image_path: "assets/images/jaralogo.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"
  ios:
    generate: true
    image_path: "assets/images/jaralogo.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"
    remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/images/jaralogo.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"
  windows:
    generate: true
    image_path: "assets/images/jaralogo.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/images/jaralogo.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"

flutter_native_splash:
  color: "#F5A623"  # Match your Flutter splash background
  image: assets/images/jara_market_logo.png  # Should be centered and big enough
  android: true
  ios: true
  web: true